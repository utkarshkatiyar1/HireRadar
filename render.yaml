services:
  - type: web
    name: hireradar-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
